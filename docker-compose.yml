    environment:
      <<: *common-env
      SERVICE_NAME: config
      DATABASE_URL: postgresql+asyncpg://hotsot:hotsot_dev_pass@postgres:5432/hotsot_config
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
