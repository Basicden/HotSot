# HotSot V2 — Kubernetes ConfigMap for all 18 microservices
apiVersion: v1
kind: ConfigMap
metadata:
  name: hotsot-config
  namespace: hotsot
data:
  ENVIRONMENT: "production"
  KAFKA_BOOTSTRAP: "kafka.hotsot.svc.cluster.local:9092"
  REDIS_URL: "redis://redis.hotsot.svc.cluster.local:6379/0"
  POSTGRES_HOST: "postgres.hotsot.svc.cluster.local"
  POSTGRES_USER: "hotsot"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  JWT_SECRET_KEY: "CHANGE_ME_JWT_SECRET"
  AUTH_SECRET: "CHANGE_ME_AUTH_SECRET"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.hotsot.svc.cluster.local:4317"
  RAZORPAY_KEY_ID: "CHANGE_ME_RAZORPAY_KEY"
  RAZORPAY_KEY_SECRET: "CHANGE_ME_RAZORPAY_SECRET"
---
# Shared service template — each service gets its own Deployment + Service
# Below are all 18 service Deployments

# ═══════════════════════════════════════════════════════════════
# ORDER SERVICE
# ═══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: hotsot
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: hotsot/order-service:latest
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: hotsot-config
        env:
        - name: SERVICE_NAME
          value: "order"
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):5432/hotsot_order"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: hotsot
spec:
  selector:
    app: order-service
  ports:
  - port: 8001
    targetPort: 8001

---
