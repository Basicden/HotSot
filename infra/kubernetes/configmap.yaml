# VENDOR SERVICE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-service
  namespace: hotsot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vendor-service
  template:
    metadata:
      labels:
        app: vendor-service
    spec:
      containers:
      - name: vendor-service
        image: hotsot/vendor-service:latest
        ports:
        - containerPort: 8010
        envFrom:
        - configMapRef:
            name: hotsot-config
        env:
        - name: SERVICE_NAME
          value: "vendor"
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):5432/hotsot_vendor"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet: { path: /health/live, port: 8010 }
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health/ready, port: 8010 }
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vendor-service
  namespace: hotsot
spec:
  selector: { app: vendor-service }
  ports:
  - { port: 8010, targetPort: 8010 }

