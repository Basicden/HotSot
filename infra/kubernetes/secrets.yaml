apiVersion: v1
kind: Secret
metadata:
  name: hotsot-secrets
  namespace: hotsot
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://hotsot:CHANGE_ME_DB_PASSWORD@postgres.hotsot.svc.cluster.local:5432/hotsot_order"
  redis-url: "redis://redis.hotsot.svc.cluster.local:6379/0"
  kafka-bootstrap: "kafka.hotsot.svc.cluster.local:9092"
  jwt-secret: "CHANGE_ME_JWT_SECRET_IN_PRODUCTION"
  razorpay-key-id: "CHANGE_ME_RAZORPAY_KEY"
  razorpay-key-secret: "CHANGE_ME_RAZORPAY_SECRET"
