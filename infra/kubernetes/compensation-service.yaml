apiVersion: apps/v1
kind: Deployment
metadata:
  name: compensation-service
  namespace: hotsot
  labels:
    app: compensation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compensation-service
  template:
    metadata:
      labels:
        app: compensation-service
    spec:
      containers:
      - name: compensation-service
        image: hotsot/compensation-service:latest
        ports:
        - containerPort: 8009
        envFrom:
        - configMapRef:
            name: hotsot-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8009
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8009
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: compensation-service
  namespace: hotsot
spec:
  type: ClusterIP
  selector:
    app: compensation-service
  ports:
  - port: 8009
    targetPort: 8009
