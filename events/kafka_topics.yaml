# HotSot Kafka Topics — Event Backbone (V2 Standardized Naming)
# Convention: hotsot.{domain}.events.v1
# All state changes flow through these topics.
# See shared/types/schemas.py KAFKA_TOPICS for the canonical source of truth.

topics:
  # ─── Order lifecycle (partition key: order_id) ──────────────
  - name: hotsot.order.events.v1
    partitions: 12
    replication_factor: 3
    description: "All order lifecycle events — ORDER_CREATED through ORDER_PICKED"

  # ─── Kitchen operations (partition key: kitchen_id) ─────────
  - name: hotsot.kitchen.events.v1
    partitions: 12
    replication_factor: 3
    description: "Kitchen execution events — PREP_STARTED, PREP_COMPLETED, KITCHEN_OVERLOAD"

  # ─── Slot engine (partition key: order_id) ──────────────────
  - name: hotsot.slot.events.v1
    partitions: 6
    replication_factor: 3
    description: "Slot reservation and conflict events — SLOT_RESERVED, SLOT_FILLED"

  # ─── Priority engine (partition key: order_id) ──────────────
  - name: hotsot.priority.events.v1
    partitions: 6
    replication_factor: 3
    description: "Priority scoring and queue assignment — PRIORITY_UPDATED, QUEUE_ASSIGNED"

  # ─── Shelf management (partition key: kitchen_id) ───────────
  - name: hotsot.shelf.events.v1
    partitions: 6
    replication_factor: 3
    description: "Shelf assignment, TTL, and expiry events"

  # ─── Arrival detection (partition key: order_id) ────────────
  - name: hotsot.arrival.events.v1
    partitions: 6
    replication_factor: 3
    description: "User arrival and geofence events — ARRIVAL_DETECTED, HANDOFF_COMPLETED"

  # ─── ETA prediction (partition key: order_id) ───────────────
  - name: hotsot.eta.events.v1
    partitions: 6
    replication_factor: 3
    description: "ETA prediction and recalculation events — ETA_UPDATED, ETA_RECALCULATED"

  # ─── Payment lifecycle (partition key: order_id) ────────────
  - name: hotsot.payment.events.v1
    partitions: 6
    replication_factor: 3
    description: "Payment lifecycle events — PAYMENT_PENDING, PAYMENT_CONFIRMED"

  # ─── Notifications (partition key: user_id) ─────────────────
  - name: hotsot.notification.events.v1
    partitions: 6
    replication_factor: 3
    description: "Push, SMS, and in-app notification events"

  # ─── Compensation (partition key: order_id) ─────────────────
  - name: hotsot.compensation.events.v1
    partitions: 6
    replication_factor: 3
    description: "Refund and compensation events — COMPENSATION_TRIGGERED, COMPENSATION_COMPLETED"

  # ─── Incidents (partition key: kitchen_id) ──────────────────
  - name: hotsot.incident.events.v1
    partitions: 3
    replication_factor: 3
    description: "Incident detection and escalation — INCIDENT_DELAY_DETECTED, INCIDENT_ESCALATED"

  # ─── Dead Letter Queues ─────────────────────────────────────
  - name: hotsot.dlq.order.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for order events"

  - name: hotsot.dlq.kitchen.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for kitchen events"

  - name: hotsot.dlq.slot.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for slot events"

  - name: hotsot.dlq.shelf.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for shelf events"

  - name: hotsot.dlq.arrival.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for arrival events"

  - name: hotsot.dlq.eta.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for ETA events"

  - name: hotsot.dlq.payment.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for payment events"

  - name: hotsot.dlq.notification.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for notification events"

  - name: hotsot.dlq.compensation.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for compensation events"

  - name: hotsot.dlq.incident.events.v1
    partitions: 3
    replication_factor: 3
    description: "Dead letter queue for incident events"

consumer_groups:
  - name: order-service-group
    topics: [hotsot.order.events.v1, hotsot.kitchen.events.v1, hotsot.shelf.events.v1, hotsot.arrival.events.v1, hotsot.compensation.events.v1, hotsot.eta.events.v1]

  - name: kitchen-service-group
    topics: [hotsot.order.events.v1, hotsot.kitchen.events.v1, hotsot.priority.events.v1]

  - name: eta-service-group
    topics: [hotsot.order.events.v1, hotsot.kitchen.events.v1, hotsot.eta.events.v1]

  - name: shelf-service-group
    topics: [hotsot.kitchen.events.v1, hotsot.shelf.events.v1]

  - name: notification-service-group
    topics: [hotsot.order.events.v1, hotsot.kitchen.events.v1, hotsot.shelf.events.v1, hotsot.compensation.events.v1, hotsot.incident.events.v1]

  - name: realtime-service-group
    topics: [hotsot.eta.events.v1, hotsot.kitchen.events.v1, hotsot.shelf.events.v1, hotsot.arrival.events.v1]

  - name: ml-service-feedback-group
    topics: [hotsot.order.events.v1, hotsot.shelf.events.v1]
